name: Build MicroShift OS

on:
  push:
    branches: ['main']
    paths: ['os/**']
  pull_request:
    branches: ['main']
    paths: ['os/**']
  schedule:
    - cron: '0 1 * * Fri'
  workflow_dispatch:
    inputs:
      build_iso:
        description: 'Build ISO images'
        default: true
        type: boolean

# Centralized environment configuration
env:
  IMAGE_NAME: edgeworks/base-os
  REGISTRY: harbor.tjedgeworks.ai
  REPO_OWNER: ramaedge
  CONTAINERFILE: Containerfile.microshift
  SCAN_SEVERITY: CRITICAL,HIGH,MEDIUM

jobs:
  build-scan-test:
    name: Build, Test & Push MicroShift OS
    runs-on: os-builder-runner-set
    outputs:
      image-ref: ${{ steps.build.outputs.image-ref }}
      version: ${{ steps.version.outputs.version }}
    permissions:
      contents: read
      packages: write
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Load version configuration
        id: versions
        uses: ./.github/actions/load-versions

      - name: Calculate version
        id: version
        uses: ./.github/actions/calculate-version

      - name: Authenticate with Harbor
        uses: ./.github/actions/harbor-auth
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build container image
        id: build
        uses: ./.github/actions/build-container
        with:
          image-name: ${{ env.IMAGE_NAME }}
          version: ${{ steps.version.outputs.version }}
          sha: ${{ steps.version.outputs.sha }}
          containerfile: ${{ env.CONTAINERFILE }}
          registry: ${{ env.REGISTRY }}
          repository-owner: ${{ env.REPO_OWNER }}
          otel-version: ${{ steps.versions.outputs.otel-version }}
          fedora-version: ${{ steps.versions.outputs.fedora-version }}

      - name: Security scan
        uses: ./.github/actions/trivy-scan
        with:
          scan-ref: ${{ steps.build.outputs.image-ref }}
          severity: ${{ env.SCAN_SEVERITY }}
          output-format: 'sarif'
          upload-sarif: 'true'
          sarif-category: 'trivy-container-microshift'

      - name: Test container image
        uses: ./.github/actions/test-container
        with:
          image-ref: ${{ steps.build.outputs.image-ref }}
          test-type: 'microshift'

      - name: Push to Harbor registry
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        run: |
          LOCAL_IMAGE="${{ steps.build.outputs.image-ref }}"
          HARBOR_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}"

          echo "Tagging image for Harbor registry..."
          echo "Source: $LOCAL_IMAGE"
          echo "Target: $HARBOR_IMAGE"

          podman tag "$LOCAL_IMAGE" "$HARBOR_IMAGE"

          echo "Pushing to Harbor registry..."
          podman push "$HARBOR_IMAGE"

          echo "Successfully pushed: $HARBOR_IMAGE"

  # Conditional ISO build
  build-iso:
    name: Build MicroShift ISO
    runs-on: os-builder-runner-set
    needs: build-scan-test
    if: github.event.inputs.build_iso == 'true' || (github.event_name == 'schedule')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate with Harbor
        uses: ./.github/actions/harbor-auth
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Pull built image
        run: |
          echo "Pulling built image from registry..."
          podman pull "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build-scan-test.outputs.version }}"

      - name: Build MicroShift ISO
        id: iso
        uses: ./.github/actions/build-iso
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build-scan-test.outputs.version }}
