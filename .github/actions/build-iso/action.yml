name: 'Build Bootc ISO'
description: 'Build bootable anaconda ISO from container image using bootc-image-builder'
author: 'os-builder'
branding:
  icon: 'disc'
  color: 'orange'

inputs:
  image-ref:
    description: 'Container image reference to build ISO from'
    required: true
  config-file:
    description: 'Path to TOML configuration file for bootc-image-builder'
    required: false
    default: './os/iso-config.toml'
  output-dir:
    description: 'Output directory for ISO files'
    required: false
    default: 'iso-output'

outputs:
  iso-path:
    description: 'Path to generated ISO file'
    value: ${{ steps.build.outputs.iso_path }}
  iso-size:
    description: 'Size of generated ISO file'
    value: ${{ steps.build.outputs.iso_size }}

runs:
  using: 'composite'
  steps:
    - name: Build ISO
      id: build
      shell: bash
      run: |
        CONFIG_FILE="${{ inputs.config-file }}"
        OUTPUT_DIR="${{ inputs.output-dir }}"
        IMAGE_REF="${{ inputs.image-ref }}"

        if [ ! -f "$CONFIG_FILE" ]; then
          echo "Configuration file not found: $CONFIG_FILE"
          exit 1
        fi

        mkdir -p "$OUTPUT_DIR"

        echo "Building anaconda ISO..."
        echo "  Image: $IMAGE_REF"
        echo "  Config: $CONFIG_FILE"

        sudo podman run --rm --privileged \
          --security-opt label=type:unconfined_t \
          -v "$(pwd)/${OUTPUT_DIR}":/output \
          -v "$(pwd)/${CONFIG_FILE}":/config.toml:ro \
          quay.io/centos-bootc/bootc-image-builder:latest \
          --type anaconda-iso \
          --config /config.toml \
          --local \
          "$IMAGE_REF"

        ISO_FILE=$(find "$OUTPUT_DIR" -name "*.iso" | head -1)
        if [ -z "$ISO_FILE" ]; then
          echo "No ISO file found in output directory"
          ls -la "$OUTPUT_DIR"
          exit 1
        fi

        ISO_SIZE=$(du -h "$ISO_FILE" | cut -f1)

        echo "iso_path=${ISO_FILE}" >> $GITHUB_OUTPUT
        echo "iso_size=${ISO_SIZE}" >> $GITHUB_OUTPUT

        echo "ISO build complete: $(basename "$ISO_FILE") ($ISO_SIZE)"
